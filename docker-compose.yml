services:
  db:
    build: ./db
    env_file: "db/db.env"
    ports:
      - "27017:27017"
    networks:
      - back-tier
    command:
      - "--config"
      - "/etc/mongo/mongod.conf"
    secrets:
      - db_passwd
      - db_app_passwd
  
  backend:
    build: ./backend
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "dev-secret"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
    ports:
      - "8000:8000"
    networks:
      - back-tier
      - front-tier
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
      - "443:443"
    networks:
      - front-tier
#   depends_on:
#     backend:
#         condition: service_healthy

networks:
  back-tier:
  front-tier:

secrets:
  db_passwd:
    file: db/db_passwd.txt
  db_app_passwd:
    file: db/db_app_passwd.txt
