services:
  db:
    build: ./db
    env_file: "db/db.env"
    ports:
      - "27017:27017"
    networks:
      - back-tier
    volumes:
      - db-data:/data/db
      - type: bind
        source: ./db/mongo
        target: /etc/mongo
      - type: bind
        source: ./db/setup
        target: /docker-entrypoint-initdb.d
  
  backend:
    build: ./backend
    networks:
      - back-tier
      - front-tier

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    networks:
      - front-tier
#   depends_on:
#     backend:
#         condition: service_healthy

volumes:
  db-data:

networks:
  back-tier:
  front-tier:
