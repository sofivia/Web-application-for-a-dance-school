stages:
  - build
  - test

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

.mount-secrets:
  script:
    - install -D db/db_app_passwd.txt /run/secrets/db_app_passwd

.default_rules:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual


build-frontend:
  stage: build
  image: node:22-alpine3.21
  script:
    - cd frontend
    - npm install
    - npm run build
  rules:
    - !reference [.default_rules, rules]

test-frontend:
  stage: test
  image: node:22-alpine3.21
  script:
    - cd frontend
    - npm install
    - npm run lint
    - npx vitest run --no-watch

test-backend:
  stage: test
  image: python:3.12-slim
  script:
    - cd backend
    - pip install -r requirements-dev.txt
    - python3 -m flake8 manage.py config/ accounts/ school/ billing/
    - pip install -r requirements.txt
    - python3 manage.py check
    - python3 manage.py test
